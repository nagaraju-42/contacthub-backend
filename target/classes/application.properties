# backend/src/main/resources/application.properties

spring.application.name=contacthub-backend

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/contacthub}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server - Render uses PORT env var
server.port=${PORT:8080}
server.address=0.0.0.0

# JWT (dummy secret for mock validation)
jwt.secret=${JWT_SECRET:dummysecretkeyforlocaltestingonly1234567890abcdef}
